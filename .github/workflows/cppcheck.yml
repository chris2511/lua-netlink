name: CppCheck

on: [ push, pull_request ]

env:
  BUILD_TYPE: Release

jobs:
  cppcheck:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Install Packages
      run: sudo apt update; sudo apt install -y lua5.4 cppcheck libmnl-dev liblua5.4-dev cmake ninja-build

    - name: cppcheck
      run: cppcheck --enable=all --suppressions-list=CppCheckSuppressions.txt src/*.c
