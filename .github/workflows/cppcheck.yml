name: CppCheck

on: [ push, pull_request ]

env:
  BUILD_TYPE: Release

jobs:
  cppcheck:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Install Packages
      run: sudo apt update; sudo apt install -y lua5.4 cppcheck libmnl-dev liblua5.4-dev cmake ninja-build

    - name: cppcheck
      run: cppcheck --enable=all --suppressions-list=CppCheckSuppressions.txt src/*.c
